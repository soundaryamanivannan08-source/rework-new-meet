<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stackly Login</title>

<link rel="stylesheet" href="login.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body>

<div class="login-container">

<a href="index.html" class="back-home-btn">
    <i class="fas fa-arrow-left"></i> Back to Home
</a>

<div class="login-box">

<h1 class="logo">Stackly</h1>

<h2>Welcome Back</h2>
<p class="subtitle">Login to continue to your dashboard</p>

<form action="404.html" method="get">

<label>Email Address</label>
<input type="email" placeholder="Enter your email" required>

<label>Password</label>
<input type="password" placeholder="Enter your password" required>

<div class="login-options">

<label for="remember">
<input type="checkbox" id="remember" name="remember">
Remember me
</label>

<a href="404.html">Forgot Password?</a>

</div>

<button type="submit" class="login-btn">Login</button>

</form>

<div class="divider">
<span>OR</span>
</div>

<div class="social-login">

<a href="404.html" class="google-btn"><i class="fab fa-google"></i> Login with Google</a>
<a href="404.html" class="apple-btn"><i class="fab fa-apple"></i> Login with Apple</a>

</div>

</div>

</div>

</body>
</html>
